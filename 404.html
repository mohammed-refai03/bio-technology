<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | 404 Page</title>
    <link rel="stylesheet" href="404.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <main class="error-page-light">
        <div class="lab-grid"></div>
        
        <div class="error-container">
            <div class="error-card">
                <div class="visual-element">
                    <div class="search-circle">
                        <i class="fa-solid fa-microscope"></i>
                    </div>
                    <div class="error-number">404</div>
                </div>
                
                <div class="error-content">
                    <span class="status-badge">Analysis Failed</span>
                    <h1>Specimen Not Found</h1>
                    <p>The digital sequence you are looking for is missing from our database. It may have been relocated or the link has expired.</p>
                    
                    <div class="error-actions">
                        <a href="index.html" class="btn-primary">Return to Home</a>
                        <a href="javascript:history.back()" class="btn-outline">Go Back</a>
                    </div>
                </div>
            </div>
            <p class="error-footer">Reference Code: <span class="mono">NULL_POINTER_SEQ_77</span></p>
        </div>
    </main>

</body>
</html>
