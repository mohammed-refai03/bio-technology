<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <main class="app-viewport">
        <div class="auth-card">
            <div class="card-grid">
                <div class="card-left">
                    <header class="card-header">
                        <div class="logo">
        <a href="index.html">
            <img src="assets/logo.webp" alt="Logo">
        </a>
    </div>
                        <nav class="header-nav">
                            <a href="index.html" class="home-link">Back To Home</a>
                        </nav>
                    </header>

                    <div class="auth-body">
                        <div class="welcome-text">
                            <h1 id="authTitle">Welcome back<span>.</span></h1>
                            <p class="toggle-text">
                                <span id="toggleMsg">New to the grid?</span> 
                                <a href="#" id="toggleAuth">Create Account</a>
                            </p>
                        </div>

                        <form id="authForm" class="compact-form">
                            <div class="field-group" id="nameField" style="display: none;">
                                <label>Full Name</label>
                                <div class="input-wrapper">
                                    <i class="fa-regular fa-user"></i>
                                    <input type="text" id="fullname" placeholder="Enter your name">
                                </div>
                            </div>

                            <div class="field-group">
                                <label>Designation</label>
                                <div class="select-box">
                                    <select id="userRole" required>
                                        <option value="" disabled selected>Choose Authority</option>
                                        <option value="admin">Administrator</option>
                                        <option value="patient">Patient</option>
                                       
                                    </select>
                                </div>
                            </div>

                            <div class="field-group">
                                <label>Lab Email</label>
                                <div class="input-wrapper">
                                    <i class="fa-regular fa-envelope"></i>
                                    <input type="email" id="email" placeholder="name@bionova.lab" required>
                                </div>
                            </div>

                            <div class="field-group">
                                <label>Passkey</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-lock"></i>
                                    <input type="password" id="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="alt-btn" onclick="window.location.href='404.html'">Forgot?</button>
                                <button type="submit" class="prime-btn" id="submitBtn" >
                                    <span>Login Account</span>
                                </button>
                            </div>
                        </form>
                    </div>

                    <footer class="card-footer">
                        <p>© 2026 BioNova. Secured by Bio-Shield v2.0</p>
                    </footer>
                </div>

                <div class="card-right">
                    <div class="wave-image"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const toggleBtn = document.getElementById('toggleAuth');
        const nameField = document.getElementById('nameField');
        const authTitle = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleMsg = document.getElementById('toggleMsg');
        const authForm = document.getElementById('authForm');

        let isLogin = true;

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            if (isLogin) {
                authTitle.innerHTML = "Welcome back<span>.</span>";
                nameField.style.display = "none";
                submitBtn.querySelector('span').innerText = "Login Account";
                toggleMsg.innerText = "New to the grid?";
                toggleBtn.innerText = "Create Account";
            } else {
                authTitle.innerHTML = "Create account<span>.</span>";
                nameField.style.display = "block";
                submitBtn.querySelector('span').innerText = "Register Now";
                toggleMsg.innerText = "Already a member?";
                toggleBtn.innerText = "Log In";
            }
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const role = document.getElementById('userRole').value;
            // Logic to redirect based on the selected authority
           login();
        });
        function login() {
    const name = document.getElementById("fullname")?.value || "User";
    const email = document.getElementById("email").value;
    const role = document.getElementById("userRole").value;

    // Store values
    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userRole", role);

    // Redirect based on role
    if (role === "admin") {
        window.location.href = "admin-dashboard.html";
    } else if (role === "patient") {
        window.location.href = "user-dashboard.html";
    } else {
        alert("Please select a role");
    }
}
    </script>
</body>
</html>
